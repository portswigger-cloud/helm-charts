apiVersion: v2
name: cloudnative-pg
description: Create a Postgresql database cluster on AWS EKS using cloudnative-pg.io and any required AWS resources via crossplane.io.
type: application
version: 0.3.2
kubeVersion: ">=1.24.0-0"
keywords:
  - postgresql
  - database
  - cloudnative-pg
home: https://portswigger.net/
sources:
  - https://github.com/portswigger-cloud/helm-charts/
maintainers:
  - name: Portswigger Cloud
    email: github-portswigger-cloud@portswigger.net
appVersion: "0.0.1"
annotations:
  changelog: |
    v0.3.0:
    - Added support for Barman Cloud Plugin (CloudNativePG 1.26+ migration)
    - Backward compatible via backup.usePlugin flag (default: false)
    - New ObjectStore resource template
    - Updated Cluster and ScheduledBackup templates for plugin support
